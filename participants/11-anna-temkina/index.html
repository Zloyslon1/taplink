<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#F1F5FC">
  <title>Анна Тёмкина</title>
  <style>
    :root {
      --bg: #F1F5FC; --surface: #FFFFFF; --fg: #0B1A38; --muted: #54607A;
      --muted-soft: #94A1BC; --accent: #1F4FD1; --accent-deep: #0F2E8C;
      --accent-soft: #E8EFFE; --radius-card: 18px; --max: 480px;
      --shadow-card: 0 4px 14px rgba(15,50,140,.08), 0 1px 4px rgba(15,50,140,.04);
      --shadow-hover: 0 14px 36px rgba(15,50,140,.14), 0 4px 12px rgba(15,50,140,.08);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      font-size: 15px; line-height: 1.45; -webkit-font-smoothing: antialiased; min-height: 100vh;
    }
    a { color: inherit; text-decoration: none; }
    a, button { touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
    .page { max-width: var(--max); margin: 0 auto; padding: 24px 20px 64px; }

    .header { display: flex; align-items: flex-start; gap: 18px; padding: 8px 0 20px; }
    .header__avatar {
      flex-shrink: 0; width: 96px; height: 96px; border-radius: 50%;
      overflow: hidden; background: var(--accent-soft);
      box-shadow: 0 8px 24px rgba(15,50,140,.15), 0 0 0 4px #fff;
    }
    .header__avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .header__info { flex: 1; min-width: 0; padding-top: 2px; }
    .header__name { font-size: 17px; font-weight: 600; line-height: 1.25; margin: 0 0 8px; letter-spacing: -0.2px; }
    .header__lines { display: flex; flex-direction: column; gap: 4px; }
    .header__line { font-size: 13.5px; line-height: 1.4; color: var(--fg); }

    .bio {
      background: var(--surface); border-radius: var(--radius-card);
      padding: 18px 20px; margin-bottom: 16px; box-shadow: var(--shadow-card);
    }
    .bio__lead { font-size: 14.5px; font-weight: 600; color: var(--fg); margin: 0; line-height: 1.5; }

    .section-label {
      font-size: 12px; font-weight: 700; letter-spacing: .6px;
      text-transform: uppercase; color: var(--muted-soft);
      margin: 20px 0 10px 4px;
    }

    .card {
      display: flex; align-items: flex-start; gap: 14px; padding: 12px;
      background: var(--surface); border-radius: var(--radius-card);
      margin-bottom: 12px; box-shadow: var(--shadow-card); position: relative;
      transition: transform .18s ease, box-shadow .22s ease;
    }
    .card:hover { transform: translateY(-3px); box-shadow: var(--shadow-hover); }
    .card:active { transform: translateY(-1px); }
    .card__cover {
      flex-shrink: 0; width: 112px; aspect-ratio: 4 / 3;
      border-radius: 10px; overflow: hidden; position: relative;
    }
    .card__cover-icon {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .card__cover-icon svg { width: 38px; height: 38px; fill: rgba(255,255,255,.85); }
    .card__body { flex: 1; min-width: 0; padding-right: 18px; padding-top: 2px; }
    .card__title { font-size: 14.5px; font-weight: 600; line-height: 1.32; color: var(--fg); margin: 0 0 4px; letter-spacing: -0.1px; }
    .card__meta  { font-size: 12px; color: var(--muted-soft); line-height: 1.35; margin: 0 0 6px; }
    .card__desc  { font-size: 13px; color: var(--muted); line-height: 1.45; margin: 0; }
    .card__chevron { position: absolute; right: 14px; top: 18px; color: var(--accent); width: 16px; height: 16px; }

    .cta-wrap {
      background: var(--surface); border-radius: var(--radius-card);
      padding: 20px; box-shadow: var(--shadow-card);
    }
    .qa-cta {
      display: flex; align-items: center; justify-content: center; width: 100%;
      padding: 17px 20px; background: linear-gradient(135deg, var(--accent), var(--accent-deep));
      color: #fff; border-radius: 12px; font-size: 15px; font-weight: 700;
      letter-spacing: -0.1px; box-shadow: 0 6px 18px rgba(31,79,209,.35);
      transition: transform .15s ease, box-shadow .2s ease;
    }
    .qa-cta:hover  { transform: translateY(-2px); box-shadow: 0 10px 24px rgba(31,79,209,.42); }
    .qa-cta:active { transform: translateY(0) scale(.99); }

    @media (max-width: 360px) {
      .page { padding: 20px 16px 56px; }
      .header__avatar { width: 84px; height: 84px; }
      .card__cover { width: 96px; }
    }
  </style>
</head>
<body>
  <main class="page">

    <header class="header">
      <div class="header__avatar">
        <img src="ФОТО_АВАТАР" alt="Анна Тёмкина" width="192" height="192" decoding="async" fetchpriority="high">
      </div>
      <div class="header__info">
        <h1 class="header__name">Анна Тёмкина</h1>
        <div class="header__lines">
          <div class="header__line">Семейный психолог · Психогенеалог</div>
        </div>
      </div>
    </header>

    <div class="bio">
      <p class="bio__lead">Освобождаю от повторяющихся семейных сценариев и травм Рода</p>
    </div>

    <p class="section-label">Бесплатный материал</p>

    <a href="https://forms.gle/3x82o4pouaoFzF2v6" rel="noopener" class="card">
      <div class="card__cover" style="background: linear-gradient(135deg, #f7971e 0%, #ffd200 100%);">
        <div class="card__cover-icon">
          <svg viewBox="0 0 24 24"><path d="M9 11H7v2h2v-2zm4 0h-2v2h2v-2zm4 0h-2v2h2v-2zm2-7h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V9h14v11z"/></svg>
        </div>
      </div>
      <div class="card__body">
        <h3 class="card__title">«5 ловушек, которые крадут твою жизнь»</h3>
        <div class="card__meta">Бесплатный тест</div>
        <p class="card__desc">Узнай, какие скрытые сценарии управляют твоей жизнью прямо сейчас</p>
      </div>
      <svg class="card__chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 6l6 6-6 6"/></svg>
    </a>

    <div class="cta-wrap">
      <a href="https://t.me/annetta_konffetta" rel="noopener" class="qa-cta">Записаться на консультацию</a>
    </div>

  </main>
</body>
</html>
