<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Александра Сальникова</title>
  <style>
:root{
  --bg:#F1F5FC;--surface:#FFFFFF;--fg:#0B1A38;--muted:#54607A;
  --muted-soft:#94A1BC;--border:#DDE5F2;--accent:#1F4FD1;
  --accent-deep:#0F2E8C;--radius:18px;--radius-sm:12px;--max:480px;
  --sh:0 4px 14px rgba(15,50,140,.08),0 1px 4px rgba(15,50,140,.04);
  --sh-h:0 14px 36px rgba(15,50,140,.14),0 4px 12px rgba(15,50,140,.08);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:var(--bg);color:var(--fg);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  font-size:15px;line-height:1.45;-webkit-font-smoothing:antialiased;min-height:100vh}
a{color:inherit;text-decoration:none}
a,button{touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.page{max-width:var(--max);margin:0 auto;padding:24px 20px 64px}

/* header */
.header{display:flex;align-items:flex-start;gap:18px;padding:8px 0 20px}
.avatar{flex-shrink:0;width:96px;height:96px;border-radius:50%;overflow:hidden;
  background:#fff;box-shadow:0 8px 24px rgba(15,50,140,.15),0 0 0 4px #fff}
.avatar img{width:100%;height:100%;object-fit:cover;display:block}
.hinfo{flex:1;min-width:0;padding-top:2px}
.hname{font-size:17px;font-weight:600;line-height:1.25;margin:0 0 8px;letter-spacing:-.2px}
.hlines{display:flex;flex-direction:column;gap:4px}
.hline{font-size:13.5px;line-height:1.4;color:var(--fg)}

/* bio block */
.bio{background:var(--surface);border-radius:var(--radius);padding:18px 20px;
  margin-bottom:16px;box-shadow:var(--sh);font-size:14px;line-height:1.6;color:var(--muted)}

/* link card */
.lcard{display:flex;align-items:center;gap:14px;padding:14px 16px;
  background:var(--surface);border-radius:var(--radius);margin-bottom:10px;
  box-shadow:var(--sh);position:relative;
  transition:transform .18s ease,box-shadow .22s ease}
.lcard:hover{transform:translateY(-3px);box-shadow:var(--sh-h)}
.lcard:active{transform:translateY(-1px)}
.lcard__icon{flex-shrink:0;width:40px;height:40px;border-radius:50%;
  background:var(--accent-soft,#E8EFFE);display:flex;align-items:center;
  justify-content:center;color:var(--accent)}
.lcard__icon svg{width:18px;height:18px}
.lcard__label{flex:1;min-width:0;font-size:14.5px;font-weight:600;
  line-height:1.3;color:var(--fg);padding-right:18px}
.lcard__chev{position:absolute;right:14px;top:50%;transform:translateY(-50%);
  color:var(--accent);width:16px;height:16px}

/* cta button */
.cta{display:flex;align-items:center;justify-content:center;width:100%;
  padding:17px 20px;background:linear-gradient(135deg,var(--accent),var(--accent-deep));
  color:#fff;border-radius:12px;font-size:15px;font-weight:700;letter-spacing:-.1px;
  box-shadow:0 6px 18px rgba(31,79,209,.35);
  transition:transform .15s ease,box-shadow .2s ease;margin-bottom:10px}
.cta:hover{transform:translateY(-2px);box-shadow:0 10px 24px rgba(31,79,209,.42)}
.cta:active{transform:translateY(0) scale(.99)}

@media(max-width:360px){
  .page{padding:20px 16px 56px}
  .avatar{width:84px;height:84px}
}
</style>
</head>
<body>
